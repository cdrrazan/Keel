name: deploy-pages

# Publishes docs/site/ (the rendered web guide) to GitHub Pages on every push to main.
# `enablement: true` turns Pages on automatically on first run — no settings visit needed.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site
      - id: deployment
        uses: actions/deploy-pages@v4
